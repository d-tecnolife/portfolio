<style>
body {
  background: #232c34 !important;
}

.cover-shell {
  min-height: calc(100vh - 5rem);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem 1rem 3rem;
}

.cover-card {
  width: min(100%, 64rem);
  display: grid;
  grid-template-columns: minmax(220px, 340px) minmax(0, 1fr);
  gap: 2rem;
  align-items: center;
  padding: 1.5rem;
  border: 1px solid #313b48;
  border-radius: 1.5rem;
  background: #1b2229;
  box-shadow: 0 16px 34px rgba(0, 0, 0, 0.22);
}

.cover-card img {
  display: block;
  width: 100%;
  height: auto !important;
  border-radius: 1rem;
  box-shadow: 0 14px 30px rgba(0, 0, 0, 0.24);
}

.cover-copy h1,
.cover-copy p {
  margin: 0 0 1rem;
}

.cover-copy h1 {
  font-size: clamp(2rem, 4vw, 3.3rem);
  line-height: 1.05;
}

.cover-copy p {
  color: #c7d0d6 !important;
}

.cover-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 0.75rem;
}

.cover-actions a {
  display: inline-block;
  padding: 0.75rem 1rem;
  border: 1px solid #394453;
  border-radius: 999px;
  text-decoration: none;
  font: 600 0.95rem/1 system-ui, sans-serif;
  background: #232c34;
}

.cover-actions .primary {
  background: #4d8d88;
  border-color: #4d8d88;
  color: #f7fbfb !important;
}

.cover-actions .secondary {
  color: #f3f5f6 !important;
}

@media (max-width: 760px) {
  .cover-card {
    grid-template-columns: 1fr;
  }

  .cover-card img {
    max-width: 320px;
    margin: 0 auto;
  }
}
</style>
